<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Auto Spares Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">AUTO SPARES HUB</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<section class="cart-section">
    <h1>Your Cart</h1>

    <div class="cart-container">

        <div class="cart-item">
            <img src="images/brakepad.jpg" alt="">
            <div class="cart-info">
                <h3>Brake Pads</h3>
                <p>$45</p>
            </div>

            <input type="number" value="1" min="1" class="cart-qty">

            <button class="remove-btn">Remove</button>
        </div>

        <div class="cart-item">
            <img src="images/oilfilter.jpg" alt="">
            <div class="cart-info">
                <h3>Oil Filter</h3>
                <p>$20</p>
            </div>

            <input type="number" value="2" min="1" class="cart-qty">

            <button class="remove-btn">Remove</button>
        </div>

    </div>

    <div class="cart-summary">
        <h2>Total: $85</h2>
        <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
